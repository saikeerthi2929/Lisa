<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISA - Citizen Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <div class="auth-container" style="max-width: 440px;">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" style="text-decoration: none; display: inline-block; margin-bottom: 16px;">
                    <span class="material-symbols-rounded"
                        style="font-size: 40px; color: var(--role-citizen);">balance</span>
                </a>
                <div style="display: flex; justify-content: center; margin-bottom: 16px;">
                    <div
                        style="display: inline-flex; align-items: center; gap: 6px; background-color: #f0f9ff; color: var(--role-citizen); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; border: 1px solid #bae6fd;">
                        <span class="material-symbols-rounded" style="font-size: 16px;">person</span>
                        Citizen Portal
                    </div>
                </div>
                <h1 class="auth-title" style="font-size: 1.75rem;">Citizen Login</h1>
                <p class="auth-subtitle">Access your personal legal dashboard</p>
            </div>

            <form id="citizen-login-form" novalidate>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded">mail</span>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 32px;">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="primary-btn" style="width: 100%; padding: 14px;">Sign In to
                    Dashboard</button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary);">
                Don't have a citizen account? <a href="register_citizen.html"
                    style="color: var(--role-citizen); font-weight: 600; text-decoration: none;">Register here</a>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="login.html" class="back-link">
                <span class="material-symbols-rounded">arrow_back</span> Choose different portal
            </a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('citizen-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (email) {
                AuthManager.setUser('citizen', {
                    name: email.split('@')[0],
                    email: email
                });
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
