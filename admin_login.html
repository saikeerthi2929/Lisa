<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISA - Admin Console Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-login-body {
            background-color: #0f172a;
            /* Slate 900 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .admin-card {
            background: #1e293b;
            /* Slate 800 */
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-icon-wrapper {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.1);
            /* Red pulse */
            color: #ef4444;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .admin-title {
            color: white;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .admin-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .admin-form label {
            display: block;
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-form .input-wrapper {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
        }

        .admin-form .input-wrapper:focus-within {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .admin-form .input-wrapper input {
            color: white;
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            padding: 12px 0;
            font-family: inherit;
        }

        .admin-form .input-wrapper .material-symbols-rounded {
            color: #64748b;
        }

        .admin-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .admin-btn:hover {
            background-color: #dc2626;
            transform: translateY(-1px);
        }

        .admin-btn:active {
            transform: translateY(0);
        }

        .security-notice {
            margin-top: 32px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .security-notice .material-symbols-rounded {
            color: #f59e0b;
            font-size: 20px;
        }

        .security-notice p {
            color: #94a3b8;
            font-size: 0.8rem;
            line-height: 1.5;
            margin: 0;
        }

        .back-to-site {
            margin-top: 24px;
            text-align: center;
        }

        .back-to-site a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .back-to-site a:hover {
            color: white;
        }
    </style>
</head>

<body class="admin-login-body">
    <div class="admin-card">
        <div class="admin-header">
            <div class="admin-icon-wrapper">
                <span class="material-symbols-rounded" style="font-size: 32px;">admin_panel_settings</span>
            </div>
            <h1 class="admin-title">Admin Console</h1>
            <p class="admin-subtitle">Secure access for LISA administrators</p>
        </div>

        <form id="admin-login-form" class="admin-form" novalidate>
            <div style="margin-bottom: 24px;">
                <label for="admin-user">Administrator Username</label>
                <div class="input-wrapper" id="user-wrapper">
                    <span class="material-symbols-rounded">person</span>
                    <input type="text" id="admin-user" placeholder="admin_username" required>
                </div>
            </div>

            <div style="margin-bottom: 32px;">
                <label for="admin-pass">Access Code</label>
                <div class="input-wrapper" id="pass-wrapper">
                    <span class="material-symbols-rounded">key</span>
                    <input type="password" id="admin-pass" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="admin-btn">
                <span class="material-symbols-rounded" style="font-size: 20px;">lock_open</span>
                Authorize Access
            </button>
        </form>

        <div class="security-notice">
            <span class="material-symbols-rounded">security</span>
            <p>This is a protected system. Unauthorized access attempts are logged and reported. Please verify your
                credentials before proceeding.</p>
        </div>

        <div class="back-to-site">
            <a href="index.html">
                <span class="material-symbols-rounded" style="font-size: 16px;">arrow_back</span>
                Return to Public Site
            </a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();
            const userWrapper = document.getElementById('user-wrapper');
            const passWrapper = document.getElementById('pass-wrapper');

            // Reset errors
            userWrapper.style.borderColor = '';
            passWrapper.style.borderColor = '';

            // Simple demo validation
            if (username === 'admin' && (pass === 'admin123' || pass === 'password')) {
                // Set Admin Role
                AuthManager.setUser('admin', {
                    name: 'Super Admin',
                    email: 'admin@lisa.ai',
                    department: 'System Oversight'
                });

                // Redirect directly to dashboard (which will show the Admin Panel)
                window.location.href = 'dashboard.html';
            } else {
                // Visual feedback for error
                if (username !== 'admin') userWrapper.style.borderColor = '#ef4444';
                passWrapper.style.borderColor = '#ef4444';

                // Optional alert for demo
                alert('Invalid administrator credentials.');
            }
        });
    </script>
</body>

</html>
