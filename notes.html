<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes | LISA Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body class="bg-body">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">
                    <span class="material-symbols-rounded" style="color: var(--accent-color);">school</span>
                    <span>LISA Student</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="dashboard.html"><span
                                class="material-symbols-rounded">dashboard</span>Dashboard</a></li>
                    <li class="nav-item"><a href="acts.html"><span
                                class="material-symbols-rounded">menu_book</span>Simplified Acts</a></li>
                    <li class="nav-item"><a href="cases.html"><span class="material-symbols-rounded">gavel</span>Case
                            Library</a></li>
                    <li class="nav-item"><a href="explainer.html"><span
                                class="material-symbols-rounded">psychology</span>AI Explainer</a></li>
                    <li class="nav-item"><a href="quiz.html"><span class="material-symbols-rounded">quiz</span>Practice
                            Tests</a></li>
                    <li class="nav-item active"><a href="notes.html"><span
                                class="material-symbols-rounded">edit_note</span>My Notes</a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <h1 class="serif-font" style="font-size: 1.5rem;">My Study Notes</h1>
                <div style="display: flex; gap: 16px; align-items: center;">
                    <div
                        style="padding: 4px 12px; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">
                        Prototype Feature
                    </div>
                    <button class="btn btn-secondary" id="search-trigger"><span
                            class="material-symbols-rounded">search</span>Search</button>
                </div>
            </header>

            <main class="content-area">
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 32px;">
                    <!-- Saved Notes -->
                    <div>
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                            <h2 class="serif-font">Personal Annotations</h2>
                            <button class="btn btn-primary" id="add-note-btn">
                                <span class="material-symbols-rounded">add</span> New Note
                            </button>
                        </div>
                        <div id="notes-list">
                            <!-- Populated from JS -->
                        </div>
                    </div>

                    <!-- Note Modal -->
                    <div id="note-modal"
                        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
                        <div class="card" style="width:90%; max-width:500px; padding: 32px;">
                            <h2 class="serif-font" id="modal-title" style="margin-bottom: 24px;">Create New Note</h2>
                            <div style="margin-bottom: 20px;">
                                <label style="display:block; font-weight:600; margin-bottom: 8px;">Title</label>
                                <input type="text" id="note-title-input" placeholder="e.g. Res Judicata summary"
                                    style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; outline: none;">
                            </div>
                            <div style="margin-bottom: 24px;">
                                <label style="display:block; font-weight:600; margin-bottom: 8px;">Content</label>
                                <textarea id="note-content-input" placeholder="Your study notes here..."
                                    style="width: 100%; height: 150px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; resize: none; font-family: inherit;"></textarea>
                            </div>
                            <div style="display:flex; gap: 12px;">
                                <button class="btn btn-secondary" style="flex:1;"
                                    onclick="closeNoteModal()">Cancel</button>
                                <button class="btn btn-primary" style="flex:1;" id="save-note-btn">Save Note</button>
                            </div>
                        </div>
                    </div>

                    <!-- Bookmarks -->
                    <div>
                        <h2 class="serif-font" style="margin-bottom: 24px;">Bookmarks</h2>
                        <div id="bookmarks-list" class="card" style="padding: 16px;">
                            <!-- Populated from JS -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Global Search -->
    <div id="search-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div class="card" style="width:90%; max-width:600px;">
            <input type="text" id="modal-search-input" placeholder="Search..."
                style="width:100%; padding:12px; border:1px solid var(--border-color); border-radius:8px; font-size:1.1rem; outline:none;">
            <div id="search-results-box" style="margin-top:20px; max-height:400px; overflow-y:auto;"></div>
            <button class="btn btn-secondary" style="margin-top:16px; width:100%;"
                onclick="document.getElementById('search-modal').style.display='none'">Close</button>
        </div>
    </div>

    <script src="../auth.js"></script>
    <script src="../js/notes.js"></script>
    <script src="../js/search.js"></script>
</body>

</html>
