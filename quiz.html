<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Tests | LISA Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body class="bg-body">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="logo">
                    <span class="material-symbols-rounded" style="color: var(--accent-color);">school</span>
                    <span>LISA Student</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="dashboard.html"><span
                                class="material-symbols-rounded">dashboard</span>Dashboard</a></li>
                    <li class="nav-item"><a href="acts.html"><span
                                class="material-symbols-rounded">menu_book</span>Simplified Acts</a></li>
                    <li class="nav-item"><a href="cases.html"><span class="material-symbols-rounded">gavel</span>Case
                            Library</a></li>
                    <li class="nav-item"><a href="explainer.html"><span
                                class="material-symbols-rounded">psychology</span>AI Explainer</a></li>
                    <li class="nav-item active"><a href="quiz.html"><span
                                class="material-symbols-rounded">quiz</span>Practice Tests</a></li>
                    <li class="nav-item"><a href="notes.html"><span class="material-symbols-rounded">edit_note</span>My
                            Notes</a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="top-header">
                <h1 class="serif-font" style="font-size: 1.5rem;">Practice Tests</h1>
                <div style="display: flex; gap: 16px; align-items: center;">
                    <div
                        style="padding: 4px 12px; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">
                        Demo Mode
                    </div>
                    <button class="btn btn-secondary" id="search-trigger"><span
                            class="material-symbols-rounded">search</span>Search</button>
                </div>
            </header>

            <main class="content-area">
                <div id="quiz-menu">
                    <h2 class="serif-font" style="margin-bottom: 24px;">Select your Subject</h2>
                    <div id="quiz-list"
                        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
                        <!-- Cards -->
                    </div>
                </div>

                <div id="quiz-play" style="display:none;">
                    <button class="btn btn-secondary" style="margin-bottom: 24px;"
                        onclick="window.location.reload()"><span class="material-symbols-rounded">close</span> Exit
                        Quiz</button>

                    <div class="card" style="max-width: 700px; margin: 0 auto; padding: 40px;">
                        <div id="quiz-header" style="margin-bottom: 32px;">
                            <span id="quiz-progress" class="text-muted"
                                style="font-size: 0.9rem; font-weight: 600;"></span>
                            <h2 id="q-text" class="serif-font" style="margin-top: 12px; line-height: 1.4;"></h2>
                        </div>

                        <div id="options-box" style="display: flex; flex-direction: column; gap: 12px;">
                            <!-- Options from JS -->
                        </div>

                        <div id="q-explanation" class="card"
                            style="display:none; margin-top: 32px; background: #f0fdf4; border-color: #bbf7d0;">
                            <strong style="color: var(--law-consti); display:block; margin-bottom: 8px;">Correct Answer
                                Explanation:</strong>
                            <p id="exp-text"></p>
                            <button id="next-btn" class="btn btn-primary" style="margin-top: 20px; width:100%;">Next
                                Question</button>
                        </div>
                    </div>
                </div>

                <div id="quiz-result" style="display:none; text-align:center; padding: 60px;">
                    <div class="card" style="max-width: 400px; margin: 0 auto;">
                        <span class="material-symbols-rounded"
                            style="font-size: 5rem; color: var(--warning); margin-bottom: 20px;">emoji_events</span>
                        <h2 class="serif-font">Quiz Completed!</h2>
                        <p style="font-size: 1.2rem; margin: 16px 0;">Final Score: <strong id="final-score"></strong>
                        </p>
                        <button class="btn btn-primary" style="width:100%;" onclick="window.location.reload()">Return to
                            Menu</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Global Search -->
    <div id="search-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div class="card" style="width:90%; max-width:600px;">
            <input type="text" id="modal-search-input" placeholder="Search..."
                style="width:100%; padding:12px; border:1px solid var(--border-color); border-radius:8px; font-size:1.1rem; outline:none;">
            <div id="search-results-box" style="margin-top:20px; max-height:400px; overflow-y:auto;"></div>
            <button class="btn btn-secondary" style="margin-top:16px; width:100%;"
                onclick="document.getElementById('search-modal').style.display='none'">Close</button>
        </div>
    </div>

    <style>
        .option-btn {
            width: 100%;
            padding: 16px;
            text-align: left;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #f8fafc;
            border-color: var(--accent-color);
        }

        .option-btn.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
            font-weight: 700;
        }

        .option-btn.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
            font-weight: 700;
        }
    </style>

    <script src="../auth.js"></script>
    <script src="../js/quizzes.js"></script>
    <script src="../js/search.js"></script>
</body>

</html>
